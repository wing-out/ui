name: Android E2E Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  ANDROID_API_LEVEL: 34
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_TARGET: "google_apis"
  ANDROID_ARCH: x86_64
  EMULATOR_PROFILE: pixel_6

jobs:
  android-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-$ANDROID_API_LEVEL" \
            "build-tools;$ANDROID_BUILD_TOOLS" \
            "system-images;android-$ANDROID_API_LEVEL;$ANDROID_TARGET;$ANDROID_ARCH" \
            "emulator"

      - name: Set up Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          target: android
          arch: android_x86_64
          modules: 'qtgrpc qtprotobuf qtshadertools qtmultimedia'

      - name: Build Android APK
        run: |
          # Build the Go backend library for Android
          make backend-android-x86_64 || true

          # Build Qt frontend as Android APK
          cmake -B build/android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-$ANDROID_API_LEVEL \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            .
          cmake --build build/android --target apk

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --force \
            --name "test_avd" \
            --package "system-images;android-$ANDROID_API_LEVEL;$ANDROID_TARGET;$ANDROID_ARCH" \
            --device "$EMULATOR_PROFILE"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator
        run: |
          emulator -avd test_avd \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -accel on \
            -no-snapshot \
            -camera-back none \
            -camera-front none \
            &
          # Wait for the emulator to boot
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
          adb shell input keyevent 82  # unlock screen

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find build/android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found, using placeholder"
            APK_PATH="build/android/wingout.apk"
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Run Android E2E tests
        env:
          WINGOUT_APK_PATH: ${{ steps.find-apk.outputs.apk_path }}
          WINGOUT_PACKAGE_ID: com.wingout.app
          ANDROID_SERIAL: emulator-5554
        run: |
          go test -tags android_e2e -count=1 -v -timeout 30m \
            ./tests/e2e/android/ 2>&1 | tee android-e2e-output.txt

      - name: Collect screenshots
        if: always()
        run: |
          mkdir -p android-e2e-screenshots
          cp /tmp/wingout_e2e_screenshots/*.png android-e2e-screenshots/ 2>/dev/null || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-screenshots
          path: android-e2e-screenshots/
          retention-days: 14

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-output
          path: android-e2e-output.txt
          retention-days: 14

      - name: Stop emulator
        if: always()
        run: adb emu kill || true
